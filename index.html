<!DOCTYPE html>
<html>
<head><title>CodeIQ Login</title></head>
<body>
  <h2>CodeIQ Login</h2>
  <input id="email" placeholder="Email" value="admin@codeiq.com"><br><br>
  <input id="password" type="password" placeholder="Password" value="999999"><br><br>
  <button onclick="login()">Login</button>
<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email, password, captcha_token: 'test'})
  });
  const data = await res.json();
  if (data.token) {
    localStorage.setItem('token', data.token);
    window.location.href = '/admin.html';
  } else {
    alert(data.error);
  }
}
</script>
</body>
</html>
