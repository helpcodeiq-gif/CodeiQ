<!DOCTYPE html>
<html lang="en">
<head>

    <title>CodeIQ Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 50px;
            border: 1px solid #334155;
            border-radius: 16px;
            background: rgba(30, 41, 59, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        h1 {
            color: #38bdf8;
            font-size: 3rem;
            margin-bottom: 16px;
        }
        p {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .success {
            color: #4ade80;
            font-weight: bold;
            margin-top: 24px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CodeIQ Admin</h1>
        <p>Your AI Medical Coding Co-Pilot</p>

        <p>Login system coming soon...</p>

</html>
