<!DOCTYPE html>
<html>
<head>
    <title>CodeIQ Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: #111; color: white; padding: 20px; }
        .card { background: #222; padding: 20px; border-radius: 8px; margin: 10px 0; }
        button { background: #e63946; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #d62828; }
    </style>
</head>
<body>
    <h1>CodeIQ Co-Pilot</h1>
    <button onclick="logout()">Logout</button>
    
    <div class="card">
        <h2>Welcome to CodeIQ</h2>
        <p><b>Email:</b> <span id="email">Loading...</span></p>
        <p><b>Credits:</b> <span id="credits">Loading...</span></p>
        <p><b>Referral Link:</b> <span id="ref">Loading...</span></p>
    </div>

    <script>
        // Page load avagane data test cheddam
        document.getElementById('email').innerText = 'admin@codeiq.com';
        document.getElementById('credits').innerText = '999999';
        document.getElementById('ref').innerText = 'https://codeiq.com/ref/admin123';
        
        function logout() {
            alert('Logout clicked! Login page ki veltundi');
            window.location.href = '/'; // leka nee login page url
        }
    </script>
</body>
</html>
