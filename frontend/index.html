<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeIQ Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="bg-[#1a1a2e] text-white p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">CodeIQ Co-Pilot</h1>
    <button onclick="logout()" class="bg-red-600 px-3 py-1 rounded text-sm">Logout</button>
  </div>
  <div class="p-6 max-w-4xl mx-auto">
    <h2 class="text-2xl font-bold mb-6">Welcome to CodeIQ</h2>
    <div class="bg-white p-6 rounded-lg shadow">
      <p>Email: <span id="user-email"></span></p>
      <p>Credits: <span id="user-credits"></span></p>
      <p>Referral Link: <span id="ref-link"></span></p>
    </div>
  </div>
<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = '/index.html';
async function loadProfile() {
  const res = await fetch('/api/my-profile', {headers: { 'Authorization': 'Bearer ' + token }});
  const data = await res.json();
  document.getElementById('user-email').innerText = data.email;
  document.getElementById('user-credits').innerText = data.credits;
  document.getElementById('ref-link').innerText = data.referral_link;
}
function logout() { localStorage.removeItem('token'); window.location.href = '/index.html'; }
loadProfile();
</script>
</body>
</html>
