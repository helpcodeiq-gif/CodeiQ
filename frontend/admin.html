<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{font-family:Arial;padding:15px;background:#111;color:#fff;margin:0}.card{background:#222;padding:20px;border-radius:8px;margin:10px 0}button{background:#e63946;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer}span{color:#2a9d8f;font-weight:bold}table{width:100%;border-collapse:collapse;background:#1a1a1a;margin-top:20px}th,td{border:1px solid #333;padding:8px;text-align:left}th{background:#0a0}</style></head><body><h1>CodeIQ Co-Pilot</h1><button onclick="logout()">Logout</button><div class="card"><h2>Welcome to CodeIQ</h2><p><b>Email:</b> <span id="email">Loading...</span></p><p><b>Credits:</b> <span id="credits">Loading...</span></p></div><table><thead><tr><th>ID</th><th>Email</th><th>Plan</th><th>Credits</th></tr></thead><tbody id="u"></tbody></table><script>fetch('/api/admin/stats',{credentials:'include'}).then(r=>{if(!r.ok)throw'Auth';return r.json()}).then(d=>{email.innerText=d.users[0].email;credits.innerText=d.users[0].credits;u.innerHTML=d.users.map(x=>`<tr><td>${x.id}</td><td>${x.email}</td><td>${x.plan}</td><td>${x.credits}</td></tr>`).join('')}).catch(_=>location.href='/');function logout(){fetch('/api/logout',{method:'POST',credentials:'include'}).then(()=>location.href='/')}</script></body></html>
