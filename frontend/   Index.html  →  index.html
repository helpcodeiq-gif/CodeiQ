<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#111;color:#fff}form{background:#1a1a1a;padding:30px;border-radius:12px;width:300px}input{width:100%;padding:12px;margin:8px 0;background:#111;border:1px solid #333;border-radius:6px;color:#fff;box-sizing:border-box}button{width:100%;padding:12px;background:#0f8;color:#000;border:none;border-radius:6px;font-weight:bold;cursor:pointer}</style></head><body><form onsubmit="login(event)"><h2>CodeIQ Admin</h2><input id="e" type="email" placeholder="Email" required><input id="p" type="password" placeholder="Password" required><button>Login</button></form><script>async function login(e){e.preventDefault();const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({email:e.value,password:p.value})});if(r.ok)location.href='/admin.html';else alert('Login failed')}</script></body></html>
